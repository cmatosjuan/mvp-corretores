<!DOCTYPE html>
<html>
<head>
  <title>QuintoAndar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial;
      background: #f7f7f7;
    }

    .wrapper {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .logo {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    .foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .nome {
      font-size: 20px;
      font-weight: 600;
    }

    .creci {
      font-size: 13px;
      color: #777;
      margin-top: 4px;
    }

    .cta {
      margin-top: 16px;
      background: #25D366;
      color: white;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      display: block;
      font-weight: 600;
    }

    .form {
      margin-top: 24px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-weight: 600;
    }

    .title {
      font-size: 18px;
      margin-top: 24px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="card">
    <div class="logo">QuintoAndar</div>

    <img id="foto" class="foto">

    <div id="nome" class="nome"></div>
    <div id="creci" class="creci"></div>

    <a id="btnWhatsapp" class="cta" target="_blank">
      Falar com especialista
    </a>
  </div>

  <div class="card form">
    <div class="title">Quer anunciar seu imóvel?</div>
    <div class="subtitle">
      Receba contato de um especialista do QuintoAndar
    </div>

    <form id="formLead">
      <input placeholder="Seu nome" id="leadNome" required>
      <input placeholder="Endereço do imóvel" id="endereco" required>
      <input placeholder="Seu telefone" id="leadTelefone" required>

      <button type="submit">Quero anunciar</button>
    </form>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw4tI9609yHdKe4LfMeYhQqE7FT5l3SXR28lyDSKmhz2RQrlOj4hyxlr7jE-EueL7Sn/exec";

const slug = new URLSearchParams(window.location.search).get("slug");

let telefoneCorretor = "";

async function carregarCorretor() {
  const res = await fetch(API + "?slug=" + slug);
  const data = await res.json();

  document.getElementById("nome").innerText = data.nome;
  document.getElementById("creci").innerText = "CRECI: " + data.creci;

  if (data.foto) {
    document.getElementById("foto").src = data.foto;
  }

  telefoneCorretor = (data.telefone || "").replace(/\D/g, "");

  if (!telefoneCorretor.startsWith("55")) {
    telefoneCorretor = "55" + telefoneCorretor;
  }

  document.getElementById("btnWhatsapp").href =
    `https://wa.me/${telefoneCorretor}`;
}

carregarCorretor();

// submit
document.getElementById("formLead").addEventListener("submit", async (e) => {
  e.preventDefault();

  const nome = leadNome.value;
  const endereco = endereco.value;
  const telefone = leadTelefone.value;

  await fetch(API, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      tipo: "lead",
      nome,
      endereco,
      telefone,
      slug
    })
  });

  const msg = `Quero anunciar meu imóvel
Nome: ${nome}
Endereço: ${endereco}
Telefone: ${telefone}`;

  window.open(`https://wa.me/${telefoneCorretor}?text=${encodeURIComponent(msg)}`);
});
</script>

</body>
</html>
