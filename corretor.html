<!DOCTYPE html>
<html>
<head>
  <title>Página do Corretor</title>
</head>
<body>

<h2 id="nome">Carregando...</h2>
<p id="creci"></p>

<hr>

<h3>Cadastrar imóvel</h3>

<form id="formLead">
  <input placeholder="Seu nome" id="leadNome" required><br>
  <input placeholder="Endereço" id="endereco" required><br>
  <input placeholder="Telefone" id="leadTelefone" required><br>
  
  <button type="submit">Cadastrar imóvel</button>
</form>

<script>
const API = "https://script.google.com/macros/s/AKfycbw4tI9609yHdKe4LfMeYhQqE7FT5l3SXR28lyDSKmhz2RQrlOj4hyxlr7jE-EueL7Sn/exec";

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

let telefoneCorretor = "";

// elementos
const nomeEl = document.getElementById("nome");
const creciEl = document.getElementById("creci");
const formLead = document.getElementById("formLead");

// 🔹 carregar corretor
async function carregarCorretor() {
  const res = await fetch(API + "?slug=" + slug);
  const data = await res.json();

  console.log("CORRETOR:", data);

  nomeEl.innerText = data.nome || "Nome não encontrado";
  creciEl.innerText = data.creci ? "CRECI: " + data.creci : "";

  telefoneCorretor = data.telefone || "";
}

carregarCorretor();

// 🔹 enviar lead + abrir WhatsApp
formLead.addEventListener("submit", async (e) => {
  e.preventDefault();

  const leadNome = document.getElementById("leadNome").value;
  const endereco = document.getElementById("endereco").value;
  const leadTelefone = document.getElementById("leadTelefone").value;

  const data = {
    tipo: "lead",
    nome: leadNome,
    endereco: endereco,
    telefone: leadTelefone,
    slug: slug
  };

  // salva no Sheets
  try {
    await fetch(API, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    console.log("Lead enviado");
  } catch (error) {
    console.error("Erro ao salvar lead:", error);
  }

  // mensagem
  const msg = `Quero cadastrar meu imóvel no QuintoAndar
  
Nome: ${leadNome}
Endereço: ${endereco}
Telefone: ${leadTelefone}`;

  // limpa telefone
  let telefoneLimpo = telefoneCorretor.replace(/\D/g, "");

  if (!telefoneLimpo.startsWith("55")) {
    telefoneLimpo = "55" + telefoneLimpo;
  }

  const url = `https://wa.me/${telefoneLimpo}?text=${encodeURIComponent(msg)}`;

  // abre WhatsApp (com fallback)
  window.open(url, "_blank");

  setTimeout(() => {
    window.location.href = url;
  }, 500);
});
</script>

</body>
</html>
