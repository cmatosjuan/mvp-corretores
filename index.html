<!DOCTYPE html>
<html>
<head>
  <title>Cadastro Corretor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: #00a699;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
    }

    #resultado {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Cadastro de Corretor</h2>

  <form id="formCorretor">
    <input placeholder="Nome" id="nome" required>
    <input placeholder="Telefone" id="telefone" required>
    <input placeholder="CRECI" id="creci" required>
    <input placeholder="Instagram" id="instagram">

    <label>Foto do corretor</label>
    <input type="file" id="foto" accept="image/*">

    <img id="preview" style="display:none;">

    <button type="submit">Cadastrar</button>
  </form>

  <p id="resultado"></p>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw4tI9609yHdKe4LfMeYhQqE7FT5l3SXR28lyDSKmhz2RQrlOj4hyxlr7jE-EueL7Sn/exec";

// 🔹 Preview da imagem
document.getElementById("foto").addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function (e) {
      const img = document.getElementById("preview");
      img.src = e.target.result;
      img.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
});

// 🔹 Submit do formulário
document.getElementById("formCorretor").addEventListener("submit", async (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;
  const creci = document.getElementById("creci").value;
  const instagram = document.getElementById("instagram").value;
  const file = document.getElementById("foto").files[0];

  let base64 = "";

  if (file) {
    if (file.size > 500000) {
      alert("Imagem muito grande (máx 500kb)");
      return;
    }

    const reader = new FileReader();
    reader.readAsDataURL(file);

    base64 = await new Promise(resolve => {
      reader.onload = () => resolve(reader.result);
    });
  }

  const data = {
    tipo: "corretor",
    nome,
    telefone,
    creci,
    instagram,
    foto: base64
  };

  try {
    await fetch(API, {
      method: "POST",
      mode: "no-cors", // 👈 evita travamento
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    document.getElementById("resultado").innerHTML =
      "✅ Corretor cadastrado com sucesso! Agora abra a planilha ou teste a página.";

    console.log("Enviado com sucesso");

  } catch (error) {
    console.error("Erro:", error);
    document.getElementById("resultado").innerHTML =
      "❌ Erro ao cadastrar.";
  }
});
</script>

</body>
</html>
