<!DOCTYPE html>
<html>
<head>
  <title>Cadastro Corretor</title>
</head>
<body>

<h2>Cadastro de Corretor</h2>

<form id="formCorretor">
  <input placeholder="Nome" id="nome" required><br>
  <input placeholder="Telefone" id="telefone" required><br>
  <input placeholder="CRECI" id="creci" required><br>
  <input placeholder="Instagram" id="instagram"><br>
  
  <button type="submit">Cadastrar</button>
</form>

<p id="resultado"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbw4tI9609yHdKe4LfMeYhQqE7FT5l3SXR28lyDSKmhz2RQrlOj4hyxlr7jE-EueL7Sn/exec";

document.getElementById("formCorretor").addEventListener("submit", async (e) => {
  e.preventDefault();
  
  const data = {
    tipo: "corretor",
    nome: nome.value,
    telefone: telefone.value,
    creci: creci.value,
    instagram: instagram.value
  };
  
  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });
  
  const json = await res.json();
  
  resultado.innerHTML = "Sua página: <a href='" + json.url + "'>" + json.url + "</a>";
});
</script>

</body>
</html>
